<div class="form-shell">
  <!-- Loading bar -->
  @if (saving()) {
    <mat-progress-bar mode="indeterminate" class="save-bar"></mat-progress-bar>
  }

  <!-- Header -->
  <div class="form-header">
    <h2 class="form-title">{{ pageTitle() }}</h2>
  </div>

  <!-- Form body -->
  @if (loading()) {
    <div class="loading-state">
      <mat-spinner diameter="48"></mat-spinner>
      <p>Loading list…</p>
    </div>
  } @else {
  <div class="form-body">
    <!-- ─── List details ─── -->
    <section class="section">
      <h3 class="section-title">List Details</h3>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>List name</mat-label>
        <input
          matInput
          required
          placeholder="e.g. Weekly Essentials"
          [value]="name()"
          (input)="name.set($any($event.target).value)"
        />
        @if (!name().trim()) {
          <mat-error>List name is required</mat-error>
        }
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <textarea
          matInput
          rows="3"
          placeholder="A short description of this list…"
          [value]="description()"
          (input)="description.set($any($event.target).value)"
        ></textarea>
      </mat-form-field>
    </section>

    <!-- ─── Ingredients ─── -->
    <section class="section">
      <h3 class="section-title">Items</h3>

      @for (ing of ingredients(); track $index) {
        <div class="ingredient-row">
          <mat-form-field appearance="outline" class="ing-name">
            <mat-label>Item</mat-label>
            <input
              matInput
              required
              placeholder="e.g. Milk"
              [value]="ing.name"
              (input)="updateIngredientName($index, $any($event.target).value)"
            />
          </mat-form-field>

          <mat-form-field appearance="outline" class="ing-amount">
            <mat-label>Amount</mat-label>
            <input
              matInput
              type="number"
              min="0"
              step="0.25"
              [value]="ing.quantity.amount"
              (input)="updateIngredientAmount($index, +$any($event.target).value)"
            />
          </mat-form-field>

          <mat-form-field appearance="outline" class="ing-unit">
            <mat-label>Unit</mat-label>
            <mat-select
              [value]="ing.quantity.unit"
              (selectionChange)="updateIngredientUnit($index, $event.value)"
            >
              @for (u of units; track u) {
                <mat-option [value]="u">{{ u }}</mat-option>
              }
            </mat-select>
          </mat-form-field>

          <button
            mat-icon-button
            color="warn"
            class="ing-delete-btn"
            aria-label="Remove item"
            (click)="removeIngredient($index)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      }

      <button mat-stroked-button (click)="addIngredient()" class="add-ing-btn">
        <mat-icon>add</mat-icon> Add item
      </button>
    </section>

    <!-- ─── Bottom actions ─── -->
    <div class="form-actions bottom-actions">
      <button mat-button type="button" (click)="cancel()">Cancel</button>
      <button
        mat-flat-button
        color="primary"
        [disabled]="!isValid() || saving()"
        (click)="save()"
      >
        @if (saving()) {
          Saving…
        } @else {
          Save
        }
      </button>
    </div>
  </div>
  }
</div>
