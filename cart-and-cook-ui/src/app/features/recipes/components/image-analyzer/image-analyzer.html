<section class="analyzer">
  <h3 class="section-title">
    <mat-icon class="title-icon">auto_awesome</mat-icon>
    AI Image Analysis
  </h3>
  <p class="hint">Enter a dish name, upload a photo, or both to auto-detect ingredients and calories.</p>

  <!-- Analysis type toggle -->
  <mat-radio-group
    [value]="analysisType()"
    (change)="analysisType.set($event.value)"
    class="type-toggle"
  >
    <mat-radio-button value="food">Photo of a dish</mat-radio-button>
    <mat-radio-button value="recipe">Photo of a recipe</mat-radio-button>
  </mat-radio-group>

  <!-- Dish title input -->
  <mat-form-field appearance="outline" class="title-field">
    <mat-label>Dish name (optional)</mat-label>
    <input
      matInput
      [value]="dishTitle()"
      (input)="dishTitle.set($any($event.target).value)"
      placeholder="e.g. Chicken Parmesan"
    />
  </mat-form-field>

  <!-- File picker + preview -->
  <div class="upload-area">
    @if (previewUrl()) {
      <div class="preview-wrapper">
        <img [src]="previewUrl()" alt="Selected image preview" class="preview-img" />
        <button mat-icon-button class="clear-btn" aria-label="Remove image" (click)="clear()">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    } @else {
      <label class="drop-zone" tabindex="0" (keydown.enter)="fileInput.click()">
        <mat-icon class="drop-icon">cloud_upload</mat-icon>
        <span>Click to select an image (optional)</span>
        <input
          #fileInput
          type="file"
          accept="image/*"
          hidden
          (change)="onFileSelected($event)"
        />
      </label>
    }
  </div>

  <!-- Progress -->
  @if (analyzing()) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }

  <!-- Error -->
  @if (error()) {
    <p class="error-msg">{{ error() }}</p>
  }

  <!-- Analyze button -->
  <button
    mat-flat-button
    color="primary"
    class="analyze-btn"
    [disabled]="!canAnalyze()"
    (click)="analyze()"
  >
    <mat-icon>{{ analyzing() ? 'hourglass_empty' : 'search' }}</mat-icon>
    {{ analyzing() ? 'Analyzing…' : 'Analyze' }}
  </button>
</section>
