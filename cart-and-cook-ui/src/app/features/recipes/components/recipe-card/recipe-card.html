<mat-card class="recipe-card" tabindex="0" role="article">
  <mat-card-header>
    <mat-card-title class="recipe-title">{{ recipe().title }}</mat-card-title>
    <mat-card-subtitle class="recipe-meta">
      <mat-icon class="meta-icon" fontIcon="schedule"></mat-icon>
      {{ recipe().minutes }} min
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    @if (recipe().description) {
      <p class="recipe-desc">{{ recipe().description }}</p>
    }
  </mat-card-content>

  <mat-card-actions align="end">
    <!-- extension point: favourite / edit / delete buttons go here -->
    <button mat-button>View</button>
  </mat-card-actions>
</mat-card>
