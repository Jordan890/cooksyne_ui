<mat-card class="recipe-card" tabindex="0" role="article" (click)="open()" (keydown.enter)="open()">
  @if (recipe().imageUrl) {
    <img mat-card-image [src]="imageFullUrl" [alt]="recipe().name" class="card-image" />
  }
  <mat-card-header>
    <mat-card-title class="recipe-title">{{ recipe().name }}</mat-card-title>
    <mat-card-subtitle class="recipe-meta">
      <mat-icon class="meta-icon" fontIcon="category"></mat-icon>
      {{ recipe().category }}
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    @if (recipe().description) {
      <p class="recipe-desc">{{ recipe().description }}</p>
    }
    @if (recipe().estimatedCalories) {
      <p class="recipe-calories">
        <mat-icon class="calorie-icon" fontIcon="local_fire_department"></mat-icon>
        {{ recipe().estimatedCalories }} cal
      </p>
    }
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-button color="warn" class="delete-btn-full" (click)="confirmDelete($event)">
      <mat-icon>delete</mat-icon> Delete
    </button>
    <button mat-icon-button color="warn" class="delete-btn-icon" aria-label="Delete" (click)="confirmDelete($event)">
      <mat-icon>close</mat-icon>
    </button>
    <button mat-button color="primary" (click)="open(); $event.stopPropagation()">Edit</button>
  </mat-card-actions>
</mat-card>
