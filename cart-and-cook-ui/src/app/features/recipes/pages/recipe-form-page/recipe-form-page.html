<div class="form-shell">
  <!-- Loading bar -->
  @if (saving()) {
    <mat-progress-bar mode="indeterminate" class="save-bar"></mat-progress-bar>
  }

  <!-- Header -->
  <mat-toolbar class="toolbar">
    <span class="toolbar-title">{{ pageTitle() }}</span>
    <span class="spacer"></span>
    <button mat-button (click)="cancel()">Cancel</button>
    <button
      mat-flat-button
      color="primary"
      [disabled]="!isValid() || saving()"
      (click)="save()"
    >
      @if (saving()) {
        Saving…
      } @else {
        Save
      }
    </button>
  </mat-toolbar>

  <!-- Form body -->
  <div class="form-body">
    <!-- ─── Basic info ─── -->
    <section class="section">
      <h3 class="section-title">Basic Information</h3>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Recipe name</mat-label>
        <input
          matInput
          required
          placeholder="e.g. Lemon Garlic Salmon"
          [value]="title()"
          (input)="title.set($any($event.target).value)"
        />
        @if (!title().trim()) {
          <mat-error>Recipe name is required</mat-error>
        }
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <textarea
          matInput
          rows="3"
          placeholder="A short description of the dish…"
          [value]="description()"
          (input)="description.set($any($event.target).value)"
        ></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Image URL</mat-label>
        <input
          matInput
          type="url"
          placeholder="https://…"
          [value]="imageUrl()"
          (input)="imageUrl.set($any($event.target).value)"
        />
      </mat-form-field>
    </section>

    <!-- ─── Metadata ─── -->
    <section class="section">
      <h3 class="section-title">Details</h3>

      <div class="meta-row">
        <mat-form-field appearance="outline">
          <mat-label>Prep time (min)</mat-label>
          <input
            matInput
            type="number"
            min="0"
            [value]="minutes()"
            (input)="minutes.set(+$any($event.target).value || null)"
          />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Servings</mat-label>
          <input
            matInput
            type="number"
            min="1"
            [value]="servings()"
            (input)="servings.set(+$any($event.target).value || null)"
          />
        </mat-form-field>
      </div>
    </section>

    <!-- ─── Ingredients ─── -->
    <section class="section">
      <h3 class="section-title">Ingredients</h3>

      @for (ing of ingredients(); track $index) {
        <div class="ingredient-row">
          <mat-form-field appearance="outline" class="ing-name">
            <mat-label>Ingredient</mat-label>
            <input
              matInput
              required
              placeholder="e.g. Salmon fillet"
              [value]="ing.name"
              (input)="updateIngredient($index, 'name', $any($event.target).value)"
            />
          </mat-form-field>

          <mat-form-field appearance="outline" class="ing-qty">
            <mat-label>Quantity</mat-label>
            <input
              matInput
              placeholder="e.g. 2 pieces"
              [value]="ing.quantity"
              (input)="updateIngredient($index, 'quantity', $any($event.target).value)"
            />
          </mat-form-field>

          <button
            mat-icon-button
            color="warn"
            aria-label="Remove ingredient"
            (click)="removeIngredient($index)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      }

      <button mat-stroked-button (click)="addIngredient()" class="add-ing-btn">
        <mat-icon>add</mat-icon> Add ingredient
      </button>
    </section>
  </div>
</div>
