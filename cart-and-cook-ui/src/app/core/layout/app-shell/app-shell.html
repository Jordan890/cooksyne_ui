<mat-sidenav-container class="shell">

  <!-- Side Navigation -->
  <mat-sidenav
    class="sidenav"
    [class.opened]="sidenavOpen()"
    [mode]="sidenavMode()"
    [opened]="sidenavOpen()"
  >
    <a routerLink="/" class="logo-link" title="Cart & Cook" (click)="isMobile() && sidenavOpen.set(false)">
      <mat-icon aria-hidden="false" aria-label="Cart & Cook icon">local_grocery_store</mat-icon>
      <span class="logo-text">Cart & Cook</span>
    </a>

    <mat-nav-list>
      <a mat-list-item routerLink="/" (click)="isMobile() && sidenavOpen.set(false)">Home</a>

      @if (auth.isAuthenticated()) {
        <a mat-list-item routerLink="/recipes" (click)="isMobile() && sidenavOpen.set(false)">Recipes</a>
        <a mat-list-item routerLink="/grocery-lists" (click)="isMobile() && sidenavOpen.set(false)">Grocery Lists</a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content>

    <!-- Top Toolbar -->
    <mat-toolbar class="toolbar">

      <button mat-icon-button (click)="toggle()">
        <mat-icon>menu</mat-icon>
      </button>

      <a routerLink="/" class="title title-link" [class.hidden-on-sidenav-open]="sidenavOpen()" (click)="isMobile() && sidenavOpen.set(false)">Cart & Cook</a>

      <span class="spacer"></span>

      <button mat-icon-button [matMenuTriggerFor]="accountMenu">
        <mat-icon>account_circle</mat-icon>
      </button>

      <mat-menu #accountMenu="matMenu">
        @if (auth.isAuthenticated()) {
          <button mat-menu-item (click)="auth.logout()">Logout</button>
        }

        @if (!auth.isAuthenticated()) {
          <button mat-menu-item (click)="auth.login()">Login</button>
        }
      </mat-menu>

    </mat-toolbar>

    <main class="content">
      <router-outlet />
    </main>

  </mat-sidenav-content>

</mat-sidenav-container>
