<mat-sidenav-container class="shell">

  <!-- Side Navigation -->
  <mat-sidenav
    class="sidenav"
    mode="side"
    [opened]="sidenavOpen()"
  >
    <div class="logo">Cart & Cook</div>

    <mat-nav-list>
      <a mat-list-item routerLink="/">Home</a>
      <a mat-list-item routerLink="/recipes">Recipes</a>
      <a mat-list-item routerLink="/grocery-lists">Grocery Lists</a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content>

    <!-- Top Toolbar -->
    <mat-toolbar class="toolbar">

      <button mat-icon-button (click)="toggle()">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="title">Cart & Cook</span>

      <span class="spacer"></span>

      <button mat-icon-button>
        <mat-icon>account_circle</mat-icon>
      </button>

    </mat-toolbar>

    <main class="content">
      <router-outlet />
    </main>

  </mat-sidenav-content>

</mat-sidenav-container>
