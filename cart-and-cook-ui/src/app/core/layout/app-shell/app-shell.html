<mat-sidenav-container class="shell">

  <!-- Side Navigation -->
  <mat-sidenav
    class="sidenav"
    mode="side"
    [opened]="sidenavOpen()"
  >
    <div class="logo" title="Cart & Cook">
      <mat-icon aria-hidden="false" aria-label="Cart & Cook icon">local_grocery_store</mat-icon>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/">Home</a>
      <a mat-list-item routerLink="/recipes">Recipes</a>
      <a mat-list-item routerLink="/grocery-lists">Grocery Lists</a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content>

    <!-- Top Toolbar -->
    <mat-toolbar class="toolbar">

      <button mat-icon-button (click)="toggle()">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="title">Cart & Cook</span>

      <span class="spacer"></span>

      <button mat-icon-button [matMenuTriggerFor]="accountMenu">
        <mat-icon>account_circle</mat-icon>
      </button>

      <mat-menu #accountMenu="matMenu">
        @if (auth.isAuthenticated()) {
          <button mat-menu-item (click)="auth.logout()">Logout</button>
        }

        @if (!auth.isAuthenticated()) {
          <button mat-menu-item (click)="auth.login()">Login</button>
        }
      </mat-menu>

    </mat-toolbar>

    <main class="content">
      <router-outlet />
    </main>

  </mat-sidenav-content>

</mat-sidenav-container>
