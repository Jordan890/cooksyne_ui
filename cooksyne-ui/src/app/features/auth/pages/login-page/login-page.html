<div class="login-wrapper">
  @if (loading()) {
    <mat-progress-bar mode="indeterminate" class="top-loader"></mat-progress-bar>
  }

  <mat-card class="login-card">
    <div class="brand">
      <mat-icon class="brand-icon">local_grocery_store</mat-icon>
      <h1>Cooksyne</h1>
      <p class="subtitle">Sign in to your local account</p>
    </div>

    @if (error()) {
      <div class="error-banner">
        <mat-icon>error_outline</mat-icon>
        <span>{{ error() }}</span>
      </div>
    }

    <form (ngSubmit)="submit()" class="login-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Username</mat-label>
        <input
          matInput
          [value]="username()"
          (input)="username.set($any($event.target).value)"
          autocomplete="username"
          autofocus
        />
        <mat-icon matPrefix>person</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input
          matInput
          [type]="hidePassword() ? 'password' : 'text'"
          [value]="password()"
          (input)="password.set($any($event.target).value)"
          autocomplete="current-password"
        />
        <mat-icon matPrefix>lock</mat-icon>
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="hidePassword() ? 'Show password' : 'Hide password'"
        >
          <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        class="full-width login-btn"
        [disabled]="loading()"
      >
        @if (loading()) {
          Signing in…
        } @else {
          Sign in
        }
      </button>
    </form>
  </mat-card>
</div>
